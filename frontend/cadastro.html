<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-narrow">
    <a href="/" class="brand">
      <span class="brand-icon">🌱</span>
      <span class="brand-name"><span class="accent">NUTRI</span>BOX</span>
    </a>

    <div class="card card-pad" style="width:100%;max-width:640px">
      <h1 class="title">Crie sua conta</h1>
      <p class="subtitle">Conte um pouco sobre você para personalizarmos seu cardápio.</p>

      <form id="form" style="margin-top:24px">
        <div class="field">
          <label class="label">Nome completo</label>
          <input class="input" id="fullName" required minlength="3" maxlength="100" />
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label class="label">E-mail</label>
            <input class="input" id="email" type="email" required maxlength="255" />
          </div>
          <div class="field">
            <label class="label">Senha</label>
            <input class="input" id="password" type="password" required minlength="6" maxlength="100" />
          </div>
        </div>

        <div class="grid grid-3">
          <div class="field">
            <label class="label">Idade</label>
            <input class="input" id="age" type="number" min="12" max="120" required />
          </div>
          <div class="field">
            <label class="label">Peso (kg)</label>
            <input class="input" id="weight" type="number" step="0.1" min="30" max="300" required />
          </div>
          <div class="field">
            <label class="label">Altura (cm)</label>
            <input class="input" id="height" type="number" min="100" max="250" required />
          </div>
        </div>

        <div class="field">
          <label class="label">Objetivo físico</label>
          <select class="select" id="goal">
            <option value="manutencao">Manutenção</option>
            <option value="emagrecimento">Emagrecimento</option>
            <option value="ganho_massa">Ganho de massa</option>
          </select>
        </div>

        <div class="field">
          <label class="label">Restrições alimentares</label>
          <div class="grid grid-4" id="restrictions"></div>
        </div>

        <button class="btn btn-primary btn-full" type="submit" id="submit">Continuar</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--muted-foreground)">
        Já tem conta? <a href="/login.html" style="color:var(--primary);font-weight:500">Entrar</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const selected = new Set();
    (async () => {
      const { restrictions } = await api("/api/restrictions");
      const wrap = document.getElementById("restrictions");
      wrap.innerHTML = restrictions.map(r => `
        <label class="check" data-r="${r}">
          <input type="checkbox" />
          <span>${r}</span>
        </label>`).join("");
      wrap.querySelectorAll(".check").forEach(el => {
        el.addEventListener("click", (e) => {
          e.preventDefault();
          const r = el.dataset.r;
          const input = el.querySelector("input");
          if (selected.has(r)) { selected.delete(r); input.checked = false; el.classList.remove("checked"); }
          else { selected.add(r); input.checked = true; el.classList.add("checked"); }
        });
      });
    })();

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit");
      btn.disabled = true; btn.textContent = "Criando...";
      try {
        const data = await api("/api/signup", {
          method: "POST",
          body: {
            fullName: document.getElementById("fullName").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
            age: +document.getElementById("age").value,
            weight: +document.getElementById("weight").value,
            height: +document.getElementById("height").value,
            goal: document.getElementById("goal").value,
            restrictions: [...selected],
          },
        });
        Storage.token = data.token;
        toast("Cadastro criado! Vamos configurar suas metas.");
        setTimeout(() => location.href = "/configuracao.html", 400);
      } catch (err) {
        toast(err.message, "error");
        btn.disabled = false; btn.textContent = "Continuar";
      }
    });
  </script>
</body>
</html>
