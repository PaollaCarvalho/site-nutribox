<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NUTRIBOX — Marmitas fitness sob medida</title>
  <meta name="description" content="Cardápio personalizado, metas nutricionais e entregas no seu ritmo. Comece sua jornada fitness com a NUTRIBOX." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="header"></div>

  <section class="hero container">
    <span class="pill">🌿 Nutrição inteligente, sabor de verdade</span>
    <h1><span class="accent">NUTRI</span>BOX</h1>
    <p>Defina suas metas de macros, escolha seu plano e receba refeições personalizadas geradas por algoritmo nutricional, prontas pra esquentar.</p>
      <a class="btn btn-outline btn-lg" href="/login.html">Já sou cliente</a>
    </div>
  </section>

  <section class="features container">
    <div class="grid grid-3" id="plans" style="width:100%;max-width:1000px;margin:0 auto;"></div>
  </section>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> Paola e Bruno. Todos os direitos reservados.</div>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    renderHeader(document.getElementById("header"));
    document.getElementById("year").textContent = new Date().getFullYear();
    (async () => {
      const { plans } = await api("/api/plans");
      const root = document.getElementById("plans");
      root.innerHTML = plans.map(p => `
        <div class="plan ${p.highlighted ? "highlighted" : ""}">
          ${p.highlighted ? '<span class="badge">Mais popular</span>' : ''}
          <h3>${p.name}</h3>
          <div class="price"><strong>${fmtCurrency(p.price)}</strong><span>${p.period}</span></div>
          <ul>${p.features.map(f => `<li>${f}</li>`).join("")}</ul>
          <button class="btn ${p.highlighted ? "btn-primary" : "btn-outline"} btn-full" data-plan="${p.type}">
            Selecionar ${p.name}
          </button>
        </div>`).join("");
      root.querySelectorAll("button[data-plan]").forEach(b => {
        b.addEventListener("click", async () => {
          try {
            toast("Plano selecionado!");
            setTimeout(() => location.href = "/cadastro.html", 400);
          } catch (e) { toast(e.message, "error"); }
        });
      });
    })();
  </script>
</body>
</html>
