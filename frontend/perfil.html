<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="app"></div>
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
<script>
(async () => {
  const user = await setupDashboard("perfil");
  if (!user) return;
  const { restrictions: ROPTS } = await api("/api/restrictions").catch(()=>({restrictions:["Glúten","Lactose","Frutos do mar","Oleaginosas","Ovo","Soja","Carne vermelha","Vegano"]}));
  const selected = new Set(user.restrictions || []);
  const n = user.nutrition || { protein: 0, carbs: 0, fat: 0, totalGrams: 0 };

  // Calcula IMC
  const imc = user.weight && user.height ? (user.weight / Math.pow(user.height/100, 2)).toFixed(1) : "–";
  const imcLabel = imc === "–" ? "–" : imc < 18.5 ? "Abaixo do peso" : imc < 25 ? "Peso normal" : imc < 30 ? "Sobrepeso" : "Obesidade";
  const tmb = user.weight && user.height && user.age
    ? Math.round(10 * user.weight + 6.25 * user.height - 5 * user.age + 5)
    : 0;

  document.getElementById("content").innerHTML = `
    <div class="mb-6">
      <h2 style="margin:0;font-size:22px;font-weight:800">Meu perfil</h2>
      <p class="text-muted text-sm" style="margin:4px 0 0">Atualize seus dados, metas e restrições alimentares.</p>
    </div>

    <!-- Card de resumo do perfil -->
    <div style="background:var(--foreground);border-radius:var(--radius-xl);padding:28px;margin-bottom:24px;display:flex;gap:20px;align-items:center;flex-wrap:wrap">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--primary);color:var(--white);display:grid;place-items:center;font-size:30px;font-weight:800;flex-shrink:0">
        ${user.fullName.charAt(0).toUpperCase()}
      </div>
      <div style="flex:1;min-width:180px">
        <div style="font-size:22px;font-weight:800;color:var(--white)">${user.fullName}</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.55);margin-top:4px">${user.email}</div>
        <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
          <span class="pill" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border:none">
            🎯 ${user.goal === "emagrecimento" ? "Emagrecimento" : user.goal === "ganho_massa" ? "Ganho de massa" : "Manutenção"}
          </span>
          <span class="pill" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);border:none">
            ⚖️ ${user.weight || "–"}kg · ${user.height || "–"}cm
          </span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;min-width:220px">
        <div style="text-align:center">
          <div style="font-size:26px;font-weight:800;color:var(--white)">${imc}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.45)">IMC · ${imcLabel}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:26px;font-weight:800;color:var(--warning)">${tmb}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.45)">TMB (kcal)</div>
        </div>
      </div>
    </div>

    <form id="form">
      <!-- Dados pessoais -->
      <div class="section">
        <div class="section-hd"><h3>Dados pessoais</h3></div>
        <div class="grid grid-2">
          <div class="field">
            <label class="label">Nome completo</label>
            <input class="input" id="fullName" value="${user.fullName}" required minlength="3" maxlength="100" />
          </div>
          <div class="field">
            <label class="label">E-mail</label>
            <input class="input" value="${user.email}" disabled />
          </div>
        </div>
        <div class="grid grid-3">
          <div class="field">
            <label class="label">Idade</label>
            <input class="input" id="age" type="number" min="12" max="120" value="${user.age || ""}" />
          </div>
          <div class="field">
            <label class="label">Peso (kg)</label>
            <input class="input" id="weight" type="number" step="0.1" min="30" max="300" value="${user.weight || ""}" />
          </div>
          <div class="field">
            <label class="label">Altura (cm)</label>
            <input class="input" id="height" type="number" min="100" max="250" value="${user.height || ""}" />
          </div>
        </div>
        <div class="field">
          <label class="label">Objetivo</label>
          <select class="select" id="goal">
            <option value="emagrecimento" ${user.goal==="emagrecimento"?"selected":""}>🎯 Emagrecimento</option>
            <option value="ganho_massa"   ${user.goal==="ganho_massa"?"selected":""}>💪 Ganho de massa</option>
            <option value="manutencao"    ${user.goal==="manutencao"?"selected":""}>⚖️ Manutenção</option>
          </select>
        </div>
      </div>

      <!-- Metas nutricionais -->
      <div class="section">
        <div class="section-hd">
          <h3>Metas nutricionais</h3>
          <span class="pill pill-green text-xs">🔥 ${calcKcal(n.protein||0, n.carbs||0, n.fat||0)} kcal/dia</span>
        </div>
        <div class="grid grid-4">
          <div class="field">
            <label class="label">Proteína (g/dia)</label>
            <input class="input" id="protein" type="number" value="${n.protein}" />
          </div>
          <div class="field">
            <label class="label">Carbo (g/dia)</label>
            <input class="input" id="carbs" type="number" value="${n.carbs}" />
          </div>
          <div class="field">
            <label class="label">Gordura (g/dia)</label>
            <input class="input" id="fat" type="number" value="${n.fat}" />
          </div>
          <div class="field">
            <label class="label">Gramas totais/refeição</label>
            <input class="input" id="totalGrams" type="number" value="${n.totalGrams || 350}" />
          </div>
        </div>
        <div id="kcal-preview" style="background:var(--primary-soft);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--foreground)">
          💡 Total calculado: <strong>${calcKcal(n.protein||0, n.carbs||0, n.fat||0)} kcal/dia</strong>
        </div>
      </div>

      <!-- Restrições -->
      <div class="section">
        <div class="section-hd"><h3>Restrições alimentares</h3></div>
        <div class="grid grid-4" id="restrictions">
          ${ROPTS.map(r => `
            <label class="check ${selected.has(r)?"checked":""}" data-r="${r}">
              <input type="checkbox" ${selected.has(r)?"checked":""}/>
              <span>${r}</span>
            </label>`).join("")}
        </div>
      </div>

      <!-- Senha -->
      <div class="section">
        <div class="section-hd"><h3>Alterar senha</h3></div>
        <div class="grid grid-2">
          <div class="field">
            <label class="label">Nova senha</label>
            <input class="input" id="new-password" type="password" placeholder="Mínimo 6 caracteres" minlength="6" />
          </div>
          <div class="field">
            <label class="label">Confirmar nova senha</label>
            <input class="input" id="confirm-password" type="password" placeholder="Repita a senha" />
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:12px">
        <button type="button" class="btn btn-outline" onclick="history.back()">Cancelar</button>
        <button class="btn btn-primary" type="submit" id="save">Salvar alterações</button>
      </div>
    </form>`;

  // Restrições toggle
  document.querySelectorAll("#restrictions .check").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault();
      const r = el.dataset.r;
      const input = el.querySelector("input");
      if (selected.has(r)) { selected.delete(r); input.checked = false; el.classList.remove("checked"); }
      else { selected.add(r); input.checked = true; el.classList.add("checked"); }
    });
  });

  // Atualiza preview de kcal ao digitar
  ["protein","carbs","fat"].forEach(id => {
    document.getElementById(id).addEventListener("input", () => {
      const p = +document.getElementById("protein").value || 0;
      const c = +document.getElementById("carbs").value   || 0;
      const f = +document.getElementById("fat").value     || 0;
      document.getElementById("kcal-preview").innerHTML =
        `💡 Total calculado: <strong>${calcKcal(p,c,f)} kcal/dia</strong>`;
    });
  });

  // Salvar
  document.getElementById("form").addEventListener("submit", async e => {
    e.preventDefault();
    const pw  = document.getElementById("new-password").value;
    const pw2 = document.getElementById("confirm-password").value;
    if (pw && pw !== pw2) { toast("As senhas não coincidem", "error"); return; }
    const btn = document.getElementById("save");
    btn.disabled = true; btn.textContent = "Salvando...";
    try {
      const body = {
        fullName: document.getElementById("fullName").value.trim(),
        age:    +document.getElementById("age").value,
        weight: +document.getElementById("weight").value,
        height: +document.getElementById("height").value,
        goal:   document.getElementById("goal").value,
        restrictions: [...selected],
        nutrition: {
          protein:    +document.getElementById("protein").value,
          carbs:      +document.getElementById("carbs").value,
          fat:        +document.getElementById("fat").value,
          totalGrams: +document.getElementById("totalGrams").value,
        },
      };
      if (pw) body.password = pw;
      await api("/api/me", { method: "PATCH", auth: true, body });
      toast("Perfil atualizado! ✅");
    } catch(err) { toast(err.message, "error"); }
    btn.disabled = false; btn.textContent = "Salvar alterações";
  });
})();
</script>
</body>
</html>
