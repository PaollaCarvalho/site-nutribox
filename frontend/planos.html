<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planos — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-narrow">
    <a href="/" class="brand">
      <span class="brand-icon">🌱</span>
      <span class="brand-name"><span class="accent">NUTRI</span>BOX</span>
    </a>

    <div style="text-align:center;margin-bottom:32px">
      <span class="step">Etapa 3 de 3</span>
      <h1 class="title" style="margin-top:8px">Escolha seu plano</h1>
      <p class="subtitle">Comece com a frequência que faz sentido para sua rotina.</p>
    </div>

    <div class="grid grid-3" id="plans" style="width:100%;max-width:1000px"></div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) {}
    (async () => {
      const { plans } = await api("/api/plans");
      const root = document.getElementById("plans");
      root.innerHTML = plans.map(p => `
        <div class="plan ${p.highlighted ? "highlighted" : ""}">
          ${p.highlighted ? '<span class="badge">Mais popular</span>' : ''}
          <h3>${p.name}</h3>
          <div class="price"><strong>${fmtCurrency(p.price)}</strong><span>${p.period}</span></div>
          <ul>${p.features.map(f => `<li>${f}</li>`).join("")}</ul>
          <button class="btn ${p.highlighted ? "btn-primary" : "btn-outline"} btn-full" data-plan="${p.type}">
            Selecionar ${p.name}
          </button>
        </div>`).join("");
      root.querySelectorAll("button[data-plan]").forEach(b => {
        b.addEventListener("click", async () => {
          try {
            await api("/api/me", { method: "PATCH", auth: true, body: { plan: b.dataset.plan } });
            toast("Plano selecionado!");
            setTimeout(() => location.href = "/dashboard.html", 400);
          } catch (e) { toast(e.message, "error"); }
        });
      });
    })();
  </script>
</body>
</html>
