<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metas nutricionais — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div id="app"></div>
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
<script>
(async () => {
  const user = await setupDashboard("config");
  if (!user) return;
  const n = user.nutrition || { protein: 150, carbs: 200, fat: 60, totalGrams: 350 };

  document.getElementById("content").innerHTML = `
    <div class="mb-6">
      <h2 style="margin:0;font-size:22px;font-weight:800">Metas nutricionais</h2>
      <p class="text-muted text-sm" style="margin:4px 0 0">Ajuste seus macros diários. O cardápio se adapta automaticamente.</p>
    </div>

    <div style="max-width:640px">
      <!-- Preview calórico em tempo real -->
      <div id="kcal-card" style="background:var(--foreground);border-radius:var(--radius-xl);padding:24px;margin-bottom:24px;text-align:center">
        <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-bottom:8px">
          Meta calórica diária
        </div>
        <div id="kcal-display" style="font-size:52px;font-weight:900;letter-spacing:-0.03em;color:var(--white)">
          ${calcKcal(n.protein, n.carbs, n.fat)}
        </div>
        <div style="font-size:16px;color:var(--warning);font-weight:600">kcal / dia</div>
        <div style="display:flex;justify-content:center;gap:24px;margin-top:16px">
          <div style="text-align:center">
            <div id="p-preview" style="font-size:20px;font-weight:800;color:var(--white)">${n.protein}g</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4)">Proteína</div>
          </div>
          <div style="text-align:center">
            <div id="c-preview" style="font-size:20px;font-weight:800;color:var(--white)">${n.carbs}g</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4)">Carboidrato</div>
          </div>
          <div style="text-align:center">
            <div id="f-preview" style="font-size:20px;font-weight:800;color:var(--white)">${n.fat}g</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.4)">Gordura</div>
          </div>
        </div>
      </div>

      <form id="form">
        <div class="section">
          <div class="section-hd"><h3>Macronutrientes diários</h3></div>

          <div class="field">
            <label class="label">Proteína por dia (g)</label>
            <input class="input" id="protein" type="number" min="0" max="500" value="${n.protein}" />
            <span class="help">1,6–2,2g por kg de peso corporal é o recomendado para esportistas.</span>
          </div>

          <div class="field">
            <label class="label">Carboidratos por dia (g)</label>
            <input class="input" id="carbs" type="number" min="0" max="700" value="${n.carbs}" />
            <span class="help">Principal fonte de energia. Ajuste conforme seu objetivo.</span>
          </div>

          <div class="field">
            <label class="label">Gordura por dia (g)</label>
            <input class="input" id="fat" type="number" min="0" max="300" value="${n.fat}" />
            <span class="help">Gorduras boas são essenciais para hormônios e absorção de vitaminas.</span>
          </div>

          <div class="field">
            <label class="label">Gramas totais por refeição (g)</label>
            <input class="input" id="totalGrams" type="number" step="10" min="100" max="800" value="${n.totalGrams || 350}" />
            <span class="help">Peso total de cada marmita. Inclui todos os alimentos.</span>
          </div>
        </div>

        <!-- Barras de distribuição visual -->
        <div class="section" style="margin-bottom:24px">
          <div class="section-hd"><h3>Distribuição de macros</h3></div>
          <div id="macro-bars"></div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" type="submit" id="submit">
          Salvar metas →
        </button>
      </form>
    </div>`;

  const updatePreview = () => {
    const p = +document.getElementById("protein").value || 0;
    const c = +document.getElementById("carbs").value   || 0;
    const f = +document.getElementById("fat").value     || 0;
    const total = calcKcal(p, c, f);
    document.getElementById("kcal-display").textContent = total;
    document.getElementById("p-preview").textContent = p + "g";
    document.getElementById("c-preview").textContent = c + "g";
    document.getElementById("f-preview").textContent = f + "g";

    const pKcal = p * 4, cKcal = c * 4, fKcal = f * 9;
    const pPct = total ? Math.round(pKcal/total*100) : 0;
    const cPct = total ? Math.round(cKcal/total*100) : 0;
    const fPct = total ? Math.round(fKcal/total*100) : 0;

    document.getElementById("macro-bars").innerHTML = `
      <div class="progress-wrap">
        <div class="progress-top"><span class="name">💪 Proteína</span><span class="val">${pPct}% · ${p}g · ${pKcal} kcal</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pPct}%;background:var(--primary)"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-top"><span class="name">🌾 Carboidrato</span><span class="val">${cPct}% · ${c}g · ${cKcal} kcal</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${cPct}%;background:var(--warning)"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-top"><span class="name">🫒 Gordura</span><span class="val">${fPct}% · ${f}g · ${fKcal} kcal</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${fPct}%;background:var(--primary)"></div></div>
      </div>`;
  };

  ["protein","carbs","fat"].forEach(id =>
    document.getElementById(id).addEventListener("input", updatePreview)
  );
  updatePreview();

  document.getElementById("form").addEventListener("submit", async e => {
    e.preventDefault();
    const btn = document.getElementById("submit");
    btn.disabled = true; btn.textContent = "Salvando...";
    try {
      await api("/api/me", { method: "PATCH", auth: true, body: { nutrition: {
        protein:    +document.getElementById("protein").value,
        carbs:      +document.getElementById("carbs").value,
        fat:        +document.getElementById("fat").value,
        totalGrams: +document.getElementById("totalGrams").value,
      }}});
      toast("Metas atualizadas! ✅");
    } catch(err) { toast(err.message, "error"); }
    btn.disabled = false; btn.textContent = "Salvar metas →";
  });
})();
</script>
</body>
</html>
