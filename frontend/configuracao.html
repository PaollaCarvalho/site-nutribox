<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metas nutricionais — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="page-narrow">
    <a href="/" class="brand">
      <span class="brand-icon">🌱</span>
      <span class="brand-name"><span class="accent">NUTRI</span>BOX</span>
    </a>

    <div style="text-align:center;margin-bottom:20px">
      <span class="step">Etapa 2 de 3</span>
      <h1 class="title" style="margin-top:8px">Suas metas nutricionais</h1>
      <p class="subtitle">Defina os macros por refeição. Nosso algoritmo monta um cardápio personalizado.</p>
    </div>

    <div class="card card-pad" style="width:100%;max-width:520px">
      <form id="form">
        <div class="field">
          <label class="label">Proteína por refeição (%)</label>
          <input class="input" id="protein" type="number" min="0" max="500" value="35" required />
        </div>
        <div class="field">
          <label class="label">Carboidratos por refeição (%)</label>
          <input class="input" id="carbs" type="number" min="0" max="500" value="50" required />
        </div>
        <div class="field">
          <label class="label">Gordura por refeição (%)</label>
          <input class="input" id="fat" type="number" min="0" max="300" value="12" required />
        </div>
        <div class="field">
          <label class="label">Gramas totais por refeição (g)</label>
          <input class="input" id="totalGrams" type="number" step="10" min="50" max="1000" value="350" required />
        </div>
        <button class="btn btn-primary btn-full" type="submit" id="submit">Continuar para planos</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (!requireAuth()) {}
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit");
      btn.disabled = true;
      try {
        await api("/api/me", {
          method: "PATCH", auth: true,
          body: { nutrition: {
            protein: +protein.value, carbs: +carbs.value,
            fat: +fat.value, totalGrams: +totalGrams.value,
          }},
        });
        toast("Metas salvas!");
        setTimeout(() => location.href = "/planos.html", 400);
      } catch (err) {
        toast(err.message, "error"); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
