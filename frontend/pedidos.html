<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedidos — NUTRIBOX</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    (async () => {
      if (!(await setupDashboard("pedidos"))) return;
      const { orders } = await api("/api/orders", { auth: true });
      document.getElementById("content").innerHTML = `
        <div style="margin-bottom:20px">
          <h2 style="margin:0;font-size:22px">Seus pedidos</h2>
          <p class="help" style="margin:4px 0 0">Acompanhe entregas e histórico de marmitas.</p>
        </div>
        <div class="table-wrap">
          <table class="orders">
            <thead>
              <tr><th>Pedido</th><th>Data</th><th>Refeições</th><th>Status</th></tr>
            </thead>
            <tbody>
              ${orders.map(o => `
                <tr>
                  <td><strong>${o.id}</strong></td>
                  <td style="color:var(--muted-foreground)">${fmtDate(o.date)}</td>
                  <td>${o.meals}</td>
                  <td><span class="status ${o.status}">${STATUS_LABELS[o.status]}</span></td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    })();
  </script>
</body>
</html>
